
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家菜单预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .dish-card { break-inside: avoid; margin-bottom: 1rem; }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .category-active {
            background-color: #fff;
            color: #ea580c;
            border-left: 4px solid #ea580c;
            font-weight: bold;
        }
        .category-item {
            transition: all 0.2s;
        }
        .category-item:hover {
            background-color: #fff;
            color: #ea580c;
        }
    </style>
</head>
<body class="pb-10 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
                    <i class="fas fa-store"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800" id="header-shop-name">美味餐厅</h1>
            </div>
            <button class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </header>

    <!-- Banner -->
    <div class="max-w-md mx-auto mt-4 px-4 w-full">
        <div class="bg-gradient-to-r from-orange-500 to-red-500 rounded-xl p-6 text-white shadow-lg relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-2xl font-bold mb-1">商家简介</h2>
                <p class="text-orange-100 text-sm">门店创始于1985年，对深圳：丰富城市餐饮文化、吸引沪籍人才、展示特区包容度。对在深沪籍人事：提供家乡的味道、情感寄托与社交据点。</p>
            </div>
            <i class="fas fa-utensils absolute -right-4 -bottom-4 text-8xl text-white opacity-10"></i>
        </div>
    </div>

    <!-- Menu Container (Vertical Layout with Sidebar) -->
    <div class="max-w-md mx-auto mt-6 w-full flex-1 flex flex-col md:flex-row gap-4 px-4">
        
        <!-- Category Sidebar (Left/Top) -->
        <div class="w-full md:w-24 flex-shrink-0">
            <div class="bg-white rounded-lg shadow-sm p-2 sticky top-20 max-h-[calc(100vh-100px)] overflow-y-auto no-scrollbar">
                <div id="category-list" class="space-y-1">
                    <!-- Categories injected here -->
                </div>
            </div>
        </div>

        <!-- Dish List (Right/Bottom) -->
        <div class="flex-1 bg-white rounded-lg shadow-sm p-4 min-h-[500px]">
            <h2 id="current-category-title" class="text-lg font-bold text-gray-800 mb-4 sticky top-0 bg-white z-10 pb-2 border-b border-gray-100">全部菜品</h2>
            <div id="dish-container" class="space-y-4">
                <!-- Dishes injected here -->
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'restaurant_db_v1';
        let appData = {
            shopName: '示例餐厅',
            categories: [],
            dishes: []
        };
        let currentCategoryId = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderPage();
            
            // Listen for storage changes from admin page
            window.addEventListener('storage', (e) => {
                if (e.key === DB_KEY) {
                    loadData();
                    renderPage();
                }
            });
        });

        function loadData() {
            try {
                const saved = localStorage.getItem(DB_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if(parsed && parsed.categories) {
                        appData = parsed;
                    }
                }
            } catch (e) {
                console.error("Load data error", e);
            }
        }

        function renderPage() {
            // Update Shop Name
            document.getElementById('header-shop-name').textContent = appData.shopName || '未知餐厅';
            
            // Render Categories
            renderCategories();
            
            // Render Initial Dishes (All or First Category)
            if (appData.categories.length > 0 && currentCategoryId === 'all') {
                // Default to first category if 'all' was selected but we want a specific view
                // Or keep 'all' logic. Let's stick to 'all' showing everything, but sidebar highlights first.
                renderDishes(currentCategoryId);
            } else {
                renderDishes(currentCategoryId);
            }
        }

        function renderCategories() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';

            // "All" Option (Optional, usually menus start with first category)
            // Let's just list the categories.
            
            if (appData.categories.length === 0) {
                container.innerHTML = '<div class="p-2 text-xs text-gray-400 text-center">暂无分类</div>';
                return;
            }

            appData.categories.forEach((cat, index) => {
                const div = document.createElement('div');
                const isActive = currentCategoryId === cat.id;
                div.className = `category-item p-3 rounded-lg text-sm cursor-pointer flex items-center justify-center md:justify-start text-center md:text-left ${isActive ? 'category-active' : 'text-gray-600 hover:bg-gray-50'}`;
                div.textContent = cat.name;
                div.onclick = () => {
                    currentCategoryId = cat.id;
                    renderCategories(); // Re-render to update active state
                    renderDishes(cat.id);
                };
                container.appendChild(div);
            });
            
            // Set default active if none selected and categories exist
            if (currentCategoryId === 'all' && appData.categories.length > 0) {
                currentCategoryId = appData.categories[0].id;
                renderCategories();
                renderDishes(currentCategoryId);
            }
        }

        function renderDishes(categoryId) {
            const container = document.getElementById('dish-container');
            const titleEl = document.getElementById('current-category-title');
            
            container.innerHTML = '';
            
            const category = appData.categories.find(c => c.id == categoryId);
            titleEl.textContent = category ? category.name : '全部菜品';

            const filteredDishes = appData.dishes.filter(d => d.categoryId == categoryId);

            if (filteredDishes.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 text-gray-400">
                        <i class="fas fa-utensils text-4xl mb-3 opacity-20"></i>
                        <p class="text-sm">该分类下暂无菜品</p>
                    </div>
                `;
                return;
            }

            filteredDishes.forEach(dish => {
                const isSoldOut = dish.isSoldOut || false;
                
                const card = document.createElement('div');
                card.className = "flex gap-4 p-3 border-b border-gray-50 last:border-0 hover:bg-gray-50 transition-colors rounded-lg";
                
                // Image
                const imgHtml = `
                    <div class="w-24 h-24 flex-shrink-0 rounded-lg overflow-hidden bg-gray-100 relative">
                        <img src="${dish.image || 'https://via.placeholder.com/150'}" alt="${dish.name} 菜品图片" class="w-full h-full object-cover ${isSoldOut ? 'grayscale opacity-60' : ''}">
                        ${isSoldOut ? '<div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-30 text-white text-xs font-bold rotate-[-15deg] border-2 border-white rounded">售罄</div>' : ''}
                    </div>
                `;

                // Info
                const infoHtml = `
                    <div class="flex-1 flex flex-col justify-between py-1">
                        <div>
                            <h3 class="font-bold text-gray-800 text-base ${isSoldOut ? 'line-through text-gray-400' : ''}">${dish.name}</h3>
                            <p class="text-xs text-gray-500 mt-1 line-clamp-2">美味佳肴，精心烹制，期待您的品尝。</p>
                        </div>
                        <div class="flex justify-between items-end mt-2">
                            <div class="text-orange-600 font-bold text-lg">
                                <span class="text-xs">¥</span>${parseFloat(dish.price).toFixed(2)}
                            </div>
                            ${!isSoldOut ? 
                                `<button class="bg-orange-600 text-white text-xs px-3 py-1.5 rounded-full hover:bg-orange-700 transition-colors shadow-sm">
                                    <i class="fas fa-plus mr-1"></i> 加入
                                 </button>` : 
                                `<button disabled class="bg-gray-200 text-gray-400 text-xs px-3 py-1.5 rounded-full cursor-not-allowed">
                                    暂不可用
                                 </button>`
                            }
                        </div>
                    </div>
                `;

                card.innerHTML = imgHtml + infoHtml;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
